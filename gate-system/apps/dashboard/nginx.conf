server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback so React Router deep links work after refresh
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the service worker or manifest
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location /assets/ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
