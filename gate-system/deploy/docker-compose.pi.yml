# Raspberry Pi override — run with:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.pi.yml up -d
#
# Set HARDWARE_MODE=rpi in services/hardware-service/.env before starting.

services:
  hardware-service:
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      # Needed so GPIO backends can detect Raspberry Pi hardware inside Docker
      - /proc/device-tree:/proc/device-tree:ro
