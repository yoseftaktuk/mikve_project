# Raspberry Pi override — REQUIRED on real hardware:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.pi.yml up -d --build
#
# Set HARDWARE_MODE=rpi in services/hardware-service/.env before starting.

services:
  hardware-service:
    privileged: true
    # Mount host /dev so GPIO chips and optional USB RFID appear even if
    # individual device nodes differ across Pi 3/4/5.
    volumes:
      - /dev:/dev
      - /proc/device-tree:/proc/device-tree:ro
